<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fröhlichen 1. April!</title>
  <style>
    body {
      background: linear-gradient(135deg, #ffcccc, #ffe680);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 4em;
      color: #ff3366;
      text-shadow: 2px 2px #ffffff;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .emojis {
      font-size: 3em;
      margin-top: 20px;
      animation: spin 6s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      background: hsl(var(--hue), 100%, 60%);
      top: -10px;
      left: var(--x);
      animation: fall 3s linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <h1>🎉 Fröhlichen 1. April! 🎉</h1>
  <div class="emojis">😂🤣😜🤪😆</div>

  <script>
    // Konfetti erzeugen
    for (let i = 0; i < 50; i++) {
      const confetti = document.createElement('div');
      confetti.classList.add('confetti');
      confetti.style.setProperty('--x', Math.random() * 100 + 'vw');
      confetti.style.setProperty('--hue', Math.random() * 360);
      confetti.style.animationDelay = Math.random() * 3 + 's';
      document.body.appendChild(confetti);
    }

    // Kleiner Gag beim Klicken
    document.body.addEventListener('click', () => {
      alert("April, April! 😄");
    });
  </script>
</body>
</html>
